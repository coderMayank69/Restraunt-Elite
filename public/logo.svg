<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#B91C1C"/>
  <!-- Inner circle rim -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>

  <!-- Fork (left) -->
  <g transform="translate(22, 10) rotate(-12, 8, 22)">
    <!-- Fork handle -->
    <rect x="6.5" y="22" width="3" height="22" rx="1.5" fill="#FBBF24"/>
    <!-- Fork tines -->
    <rect x="4" y="6" width="1.5" height="14" rx="0.75" fill="#FBBF24"/>
    <rect x="7.25" y="6" width="1.5" height="14" rx="0.75" fill="#FBBF24"/>
    <rect x="10.5" y="6" width="1.5" height="14" rx="0.75" fill="#FBBF24"/>
    <!-- Fork base connector -->
    <path d="M4 20 Q8 24 12 20" stroke="#FBBF24" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Spoon (right) -->
  <g transform="translate(34, 10) rotate(12, 6, 22)">
    <!-- Spoon handle -->
    <rect x="4.5" y="24" width="3" height="22" rx="1.5" fill="#FBBF24"/>
    <!-- Spoon bowl -->
    <ellipse cx="6" cy="14" rx="5" ry="7" fill="#FBBF24"/>
    <ellipse cx="6" cy="14" rx="3.5" ry="5.5" fill="#B91C1C" opacity="0.4"/>
  </g>
</svg>
